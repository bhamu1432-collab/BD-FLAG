<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bhagwan Decoration Catalogue</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

    <!-- Golden Border -->
    <div class="border"></div>

    <!-- Top -->

    <header>

        <div class="logo">

            <h1>BHAGWAN</h1>

            <h2>DECORATION</h2>

        </div>

    </header>


    <!-- Main -->

    <section class="content">

        <!-- Left -->

        <div class="left">

            <h3>TIRANGA</h3>

            <h4>BUNTY LADY</h4>

            <div class="line"></div>

            <p class="item-title">
                ITEM CODE
            </p>

            <div class="item-box">
                BD-004
            </div>


            <!-- Features -->

            <div class="features">

                <div class="feature">

                    <div class="icon">
                        ↔
                    </div>

                    <div>

                        <strong>5 Feet</strong>

                        <span>LONG</span>

                    </div>

                </div>

                <div class="feature">

                    <div class="icon">
                        📦
                    </div>

                    <div>

                        <strong>Pack of 5</strong>

                        <span>PACKING</span>

                    </div>
                

                </div>

                <div class="feature">

                    <div class="icon">
                        ★
                    </div>

                    <div>

                        <strong>Premium Quality</strong>

                        <span>PREMIUM FINISH</span>

                    </div>

                </div>

                <div class="feature">

                    <div class="icon">
                        🇮🇳
                    </div>

                    <div>

                        <strong>Tricolor Decoration</strong>

                        <span>PERFECT FOR ALL OCCASIONS</span>

                    </div>

                </div>

            </div>

        </div>
        <!-- Right -->

        <div class="right">

            <div class="product-image">

                <img src="assets/images/product.png"
                     alt="Product Image">

            </div>

            <div class="zoom-image">

                <img src="assets/images/product-close.png"
                     alt="Close View">

            </div>

        </div>

    </section>


    <!-- Bottom Boxes -->

    <section class="bottom">

        <div class="box">

            <img src="assets/icons/packet.png"
                 alt="Packet">

            <div>

                <h2>5</h2>

                <p>PC<br>PACKET</p>

            </div>

        </div>


        <div class="box">

            <img src="assets/icons/carton.png"
                 alt="Carton">

            <div>

                <h2>50</h2>

                <p>PACKET<br>CARTOON</p>

            </div>

        </div>


        <div class="price-box">

            <div class="badge">

                <span>PRICE CATEGORY</span>

                <h1>A1</h1>

            </div>

        </div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
