<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="toolbar">

<button id="uploadProduct">Upload Product</button>

<input type="file" id="productInput" hidden accept="image/*">

<button id="downloadBtn">Download A4</button>

</div>

<div class="page" id="capture">

<!-- Background automatically background.png se aayega -->

<div class="logo">

<input value="BHAGWAN">

<input value="DECORATION">

</div>

<div class="content">

<div class="left">

<input class="title1" value="TIRANGA">

<input class="title2" value="BUNTY LADY">

<div class="itemcode">

<label>ITEM CODE</label>

<input value="BD-004">

</div>

<div class="feature">

<span>📏</span>

<input value="5 Feet">

</div>

<div class="feature">

<span>📦</span>

<input value="Pack of 5">

</div>

<div class="feature">

<span>⭐</span>

<input value="Premium Quality">

</div>

<div class="feature">

<span>🇮🇳</span>

<input value="Perfect Decoration">

</div>

</div>

<div class="right">

<img src="assets/product.png"

id="productImage">

</div>

</div>

<div class="price">

<label>PRICE CATEGORY</label>

<input value="A1">

</div>

</div>

<script src="script.js"></script>

</body>

</html>
