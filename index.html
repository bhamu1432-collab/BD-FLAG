<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bhagwan Decoration Catalogue</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

    <!-- Golden Border -->
    <div class="border"></div>

    <!-- Top -->

    <header>

        <div class="logo">

            <h1>BHAGWAN</h1>

            <h2>DECORATION</h2>

        </div>

    </header>


    <!-- Main -->

    <section class="content">

        <!-- Left -->

        <div class="left">

            <h3>TIRANGA</h3>

            <h4>BUNTY LADY</h4>

            <div class="line"></div>

            <p class="item-title">
                ITEM CODE
            </p>

            <div class="item-box">
                BD-004
            </div>


            <!-- Features -->

            <div class="features">

                <div class="feature">

                    <div class="icon">
                        ↔
                    </div>

                    <div>

                        <strong>5 Feet</strong>

                        <span>LONG</span>

                    </div>

                </div>

                <div class="feature">

                    <div class="icon">
                        📦
                    </div>

                    <div>

                        <strong>Pack of 5</strong>

                        <span>PACKING</span>

                    </div>

                </div>

                <div class="feature">

                    <div class="icon">
                        ★
                    </div>

                    <div>

                        <strong>Premium Quality</strong>

                        <span>PREMIUM FINISH</span>

                    </div>

                </div>

                <div class="feature">

                    <div class="icon">
                        🇮🇳
                    </div>

                    <div>

                        <strong>Tricolor Decoration</strong>

                        <span>PERFECT FOR ALL OCCASIONS</span>

                    </div>

                </div>

            </div>

        </div>
