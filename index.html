<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Bhagwan Decoration</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>

<body>

<div class="toolbar">

<button id="download">
Download JPG
</button>

<button id="changeImageBtn">
Change Image
</button>

<input
type="file"
id="imageInput"
accept="image/*"
hidden>

</div>

<div id="catalogue">

<img
src="background.png"
class="bg">

<div class="overlay"></div>

<!-- LEFT -->

<div class="left">

<div class="logo">

<h1 contenteditable="true">

BHAGWAN

</h1>

<h2 contenteditable="true">

DECORATION

</h2>

</div>

<div class="productName">

<h3 contenteditable="true">

TIRANGA

</h3>

<h4 contenteditable="true">

BUNTY LADY

</h4>

</div>

<div class="itemCode">

<label>

ITEM CODE

</label>

<div
class="code"
contenteditable="true">

BD-004

</div>

</div>

<div class="features">

<div class="feature">

<img src="icons/length.png">

<div>

<b>5 Feet</b>

<span>LONG</span>

</div>

</div>

<div class="feature">

<img src="icons/packing.png">

<div>

<b>Pack Of 5</b>

<span>PACKING</span>

</div>

</div>

<div class="feature">

<img src="icons/quality.png">

<div>

<b>Premium Quality</b>

<span>Premium Finish</span>

</div>

</div>

<div class="feature">

<img src="icons/india.png">

<div>

<b>Tricolor Decoration</b>

<span>Perfect For All Occasions</span>

</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right">

<img

id="product"

src="product.png">

<div class="zoom">

<img

id="zoomImage"

src="product.png">

</div>

</div>
<!-- Bottom Section -->

<div class="bottom">

    <div class="packBox">

        <img src="icons/packet.png">

        <div>

            <h2 contenteditable="true">5</h2>

            <p>PC PACKET</p>

        </div>

    </div>

    <div class="packBox">

        <img src="icons/carton.png">

        <div>

            <h2 contenteditable="true">50</h2>

            <p>PACKET CARTON</p>

        </div>

    </div>

    <div class="priceCircle">

        <span>PRICE CATEGORY</span>

        <h1 contenteditable="true">A1</h1>

    </div>

</div>

<!-- Golden Footer -->

<div class="footer">

<div class="goldLine"></div>

<div class="stars">
★ ★ ★ ★ ★
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
