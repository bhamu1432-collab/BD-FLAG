<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catalogue Editor</title>

<link rel="stylesheet" href="style.css">

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="toolbar">

<input type="file" id="imageUpload" accept="image/*" hidden>
<button onclick="document.getElementById('imageUpload').click()">
Change Product Image
</button>

<input type="file" id="bgUpload" accept="image/*" hidden>
<button onclick="document.getElementById('bgUpload').click()">
Change Background
</button>

<input type="file" id="logoUpload" accept="image/*" hidden>
<button onclick="document.getElementById('logoUpload').click()">
Change Logo
</button>

<button id="downloadPNG">
Download PNG
</button>

<button id="downloadPDF">
Download PDF
</button>

</div>

<div id="page" class="page">

<div class="goldBorder">

<!-- HEADER -->

<div class="header">

<div class="logoBox">
<img id="logo" src="assets/logo.png" alt="Logo">
</div>

<div class="title">

<h1 contenteditable="true">
BHAGWAN DECORATION
</h1>

<h2 contenteditable="true">
TIRANGA BUNTY LADY
</h2>

</div>

</div>

<!-- BODY -->

<div class="body">

<div class="left">

<p contenteditable="true">
Item Code : 1406
</p>

<p contenteditable="true">
Packing : 10 × 10
</p>

<p contenteditable="true">
Length : 4 Meter
</p>

<p contenteditable="true">
Quality : Polyester
</p>

<p contenteditable="true">
Made In India
</p>

</div>

<div class="right">

<div id="dropZone">

<img id="productImage"
src="assets/product.png"
alt="Product">

</div>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

<div class="box" contenteditable="true">
50 Packet = 1 Bag
</div>

<div class="box" contenteditable="true">
5 Bag = 1 Carton
</div>

<div class="box" contenteditable="true">
Price Category : A
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
