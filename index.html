<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhagwan Decoration Catalogue</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="catalog">

    <!-- Left Panel -->
    <div class="left-panel">

        <div class="logo">
            <img src="assets/logo.png" alt="Logo">
        </div>

        <div class="gold-circle"></div>

        <div class="product-image">
            <img id="productImage" src="assets/product1.png" alt="Product">
        </div>

        <div class="premium">
            PREMIUM QUALITY
        </div>

    </div>

    <!-- Right Panel -->
    <div class="right-panel">

        <div class="company">
            BHAGWAN DECORATION
        </div>

        <h1 id="productName">
            TIRANGA BUNTY LADI
        </h1>

        <table>

            <tr>
                <td>Item Code</td>
                <td id="itemCode">BD-001</td>
            </tr>

            <tr>
                <td>Length</td>
                <td id="length">5 Feet</td>
            </tr>

            <tr>
                <td>Packing</td>
                <td id="packing">Pack of 5</td>
            </tr>

            <tr>
                <td>Category</td>
                <td id="category">Decoration</td>
            </tr>

            <tr>
                <td>Carton Qty</td>
                <td id="carton">100 Packs</td>
            </tr>

        </table>

        <!-- Navigation Buttons -->
        <div class="buttons">

            <button onclick="previousProduct()">
                <i class="fa-solid fa-arrow-left"></i>
                Previous
            </button>

            <button onclick="nextProduct()">
                Next
                <i class="fa-solid fa-arrow-right"></i>
            </button>

        </div>

        <!-- Contact -->

        <div class="contact">

            <div>
                <i class="fa-solid fa-phone"></i>
                +91 9876543210
            </div>

            <div>
                <i class="fa-brands fa-whatsapp"></i>
                WhatsApp
            </div>

            <div>
                <i class="fa-solid fa-globe"></i>
                www.bhagwandecoration.com
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
