<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midas Touch - New Launch</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Impact&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="poster-container">
        
        <div class="top-ribbon"></div>

        <div class="content-left">
            <div class="logo-area">
                <span class="mg-logo">MG</span>
                <p class="brand-name">MIDAS TOUCH</p>
                <div class="bar-code-line"></div>
            </div>

            <h2 class="midas-title">MIDAS TOUCH</h2>
            <h1 class="main-heading">NEW LAUNCH</h1>
            
            <div class="independence-badge">
                FOR INDEPENDENCE DAY
            </div>

            <div class="date-section">
                <span class="date-num">15</span>
                <span class="date-month">AUG</span>
            </div>
            
            <div class="skyline-graphic">
                <div class="monument-icon">🏛️</div>
                <div class="monument-icon">🕌</div>
            </div>

            <hr class="divider-line">

            <div class="product-details">
                <h3 class="tri-color-title">— TRI COLOR —</h3>
                
                <div class="item-row">
                    <span class="color-dot orange-dot"></span>
                    <span class="item-qty">4 PC</span>
                    <span class="item-name">ORANGE</span>
                </div>
                <div class="item-row">
                    <span class="color-dot white-dot"></span>
                    <span class="item-qty">4 PC</span>
                    <span class="item-name">WHITE</span>
                </div>
                <div class="item-row">
                    <span class="color-dot green-dot"></span>
                    <span class="item-qty">4 PC</span>
                    <span class="item-name">GREEN</span>
                </div>
            </div>

            <div class="price-tag-box">
                <div class="price-label">PRICE</div>
                <div class="price-value">₹ L3</div>
            </div>
        </div>

        <div class="content-right">
            <div class="product-packet">
                <div class="packet-layer orange-layer"></div>
                <div class="packet-layer white-layer">
                    <span class="packet-logo">MG</span>
                </div>
                <div class="packet-layer green-layer"></div>
            </div>
        </div>

        <div class="footer-banner">
            <p class="celebrate-text">CELEBRATE FREEDOM</p>
            <p class="decorate-text">DECORATE WITH PRIDE</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
