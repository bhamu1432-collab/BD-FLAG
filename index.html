<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Catalogue</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="toolbar">

<button id="logoBtn">Logo</button>
<input type="file" id="logoInput" hidden>

<button id="productBtn">Product</button>
<input type="file" id="productInput" hidden>

<button id="downloadBtn">
Download A4
</button>

</div>

<div class="page" id="capture">

<!-- Background -->

<img src="background.png" class="background">

<!-- Logo -->

<img src="assets/logo.png"
id="logoImage">

<!-- Company -->

<div class="company">

<div class="companyName"
contenteditable="true">

BHAGWAN

</div>

<div class="companySub"
contenteditable="true">

DECORATION

</div>

</div>

<!-- Product Title -->

<div class="productTitle">

<div class="titleGold"
contenteditable="true">

TIRANGA

</div>

<div class="titleBlack"
contenteditable="true">

BUNTY LADY

</div>

</div>

<!-- Item Code -->

<div class="itemCode">

<div class="itemLabel">

ITEM CODE

</div>

<div class="itemValue"
contenteditable="true">

BD-004

</div>

</div>

<!-- Features -->

<div class="featureBox f1">

<div class="icon">📏</div>

<div contenteditable="true">

5 Feet Long

</div>

</div>

<div class="featureBox f2">

<div class="icon">📦</div>

<div contenteditable="true">

Pack of 5

</div>

</div>

<div class="featureBox f3">

<div class="icon">⭐</div>

<div contenteditable="true">

Premium Quality

</div>

</div>

<div class="featureBox f4">

<div class="icon">🇮🇳</div>

<div contenteditable="true">

Perfect Decoration

</div>

</div>

<!-- Product -->

<img
src="assets/product.png"
id="productImage">

<!-- Bottom Left -->

<div class="packet packet1">

<div contenteditable="true">

5

</div>

<span contenteditable="true">

PC PACKET

</span>

</div>

<div class="packet packet2">

<div contenteditable="true">

50

</div>

<span contenteditable="true">

PACKET CARTON

</span>

</div>

<!-- Price -->

<div class="priceCircle">

<div
contenteditable="true">

PRICE CATEGORY

</div>

<h1
contenteditable="true">

A1

</h1>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
