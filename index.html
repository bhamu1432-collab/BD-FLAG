
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Independence Theme Catalogue</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
  <div class="top-band saffron"></div>

  <div class="header">
    <h1 contenteditable="true">YOUR BRAND NAME</h1>
    <p contenteditable="true">Independence Day Premium Collection</p>
  </div>

  <div class="content">
    <div class="drop-area" id="dropArea">
      <input type="file" id="fileInput" accept="image/*" hidden>
      <img id="preview" alt="">
      <span id="placeholder">Drag & Drop Product Image<br>or Click Here</span>
    </div>

    <div class="details">
      <h2 contenteditable="true">Product Name</h2>
      <p contenteditable="true"><b>Price:</b> ₹999</p>
      <p contenteditable="true"><b>Description:</b> Write product details here.</p>
      <ul contenteditable="true">
        <li>Premium Quality</li>
        <li>Limited Edition</li>
        <li>Made in India 🇮🇳</li>
      </ul>
    </div>
  </div>

  <div class="chakra"></div>
  <div class="bottom-band green"></div>
</div>

<script src="script.js"></script>
</body>
</html>
