<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Premium Catalogue Editor</title>

<link rel="stylesheet" href="style.css">

<!-- Premium Fonts -->

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Icons -->

<link rel="stylesheet"

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<!-- Export -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<!-- Floating Toolbar -->

<div class="toolbar">

<button onclick="imageUpload.click()">

<i class="fa-solid fa-image"></i>

Product

</button>

<button onclick="logoUpload.click()">

<i class="fa-solid fa-crown"></i>

Logo

</button>

<button onclick="bgUpload.click()">

<i class="fa-solid fa-palette"></i>

Background

</button>

<button id="downloadPNG">

<i class="fa-solid fa-download"></i>

PNG

</button>

<button id="downloadPDF">

<i class="fa-solid fa-file-pdf"></i>

PDF

</button>

<input type="file" id="imageUpload" hidden>

<input type="file" id="logoUpload" hidden>

<input type="file" id="bgUpload" hidden>

</div>

<!-- A4 -->

<div id="page" class="page">

<div class="border">

<header>

<div class="logo">

<img id="logo"

src="assets/logo.png">

</div>

<div class="heading">

<h1 contenteditable>

BHAGWAN DECORATION

</h1>

<h2 contenteditable>

Tiranga Bunty Lady

</h2>

</div>

<div class="badge"

contenteditable>

Premium

</div>

</header>

<section class="content">

<div class="details">

<div class="card"

contenteditable>

Item Code : 1406

</div>

<div class="card"

contenteditable>

Packing : 10 × 10

</div>

<div class="card"

contenteditable>

Length : 4 Meter

</div>

<div class="card"

contenteditable>

Quality : Polyester

</div>

<div class="card"

contenteditable>

Made In India 🇮🇳

</div>

</div>

<div class="preview"

id="dropZone">

<img id="productImage"

src="assets/product.png">

</div>

</section>

<footer>

<div class="box"

contenteditable>

50 Packet = 1 Bag

</div>

<div class="box"

contenteditable>

5 Bag = 1 Carton

</div>

<div class="box"

contenteditable>

Price Category : A

</div>

</footer>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
