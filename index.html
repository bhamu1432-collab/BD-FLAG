<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhagwan Decoration</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="poster">

<div class="gold-border">

<div class="left">

<h1 class="brand">
BHAGWAN
<span>DECORATION</span>
</h1>

<h2 class="title">
TIRANGA<br>
<span>BUNTY LADY</span>
</h2>

<div class="item">
<p>ITEM CODE</p>
<div class="code">
BD-004
</div>
</div>

<div class="feature">
<i class="fa-solid fa-arrows-left-right"></i>
<div>
<h3>5 Feet</h3>
<p>LONG</p>
</div>
</div>

<div class="feature">
<i class="fa-solid fa-box"></i>
<div>
<h3>Pack of 5</h3>
<p>PACKING</p>
</div>
</div>

<div class="feature">
<i class="fa-solid fa-star"></i>
<div>
<h3>Premium Quality</h3>
<p>PREMIUM FINISH</p>
</div>
</div>

<div class="feature">
<i class="fa-solid fa-flag"></i>
<div>
<h3>Tricolor Decoration</h3>
<p>PERFECT FOR ALL OCCASIONS</p>
</div>
</div>

</div>

<div class="right">

<img src="assets/product.png" class="product">

<div class="zoom">
<img src="assets/product.png">
</div>

</div>

</div>

<div class="bottom">

<div class="card">
<i class="fa-solid fa-box-open"></i>
<h2>5</h2>
<p>PC PACKET</p>
</div>

<div class="card">
<i class="fa-solid fa-box"></i>
<h2>50</h2>
<p>PACKET CARTOON</p>
</div>

<div class="price">
<h4>PRICE CATEGORY</h4>
<h1>A1</h1>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
