<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bhagwan Decoration Catalogue</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="toolbar">

<button id="downloadBtn">
Download JPG
</button>

<button id="changeImage">
Change Image
</button>

<input
type="file"
id="imageInput"
accept="image/*"
hidden>

</div>


<div id="catalogue">

<div class="goldBorder"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Left Side -->

<div class="left">

<div class="brand">

<h1 contenteditable="true">
BHAGWAN
</h1>

<h2 contenteditable="true">
DECORATION
</h2>

</div>

<div class="productTitle">

<h3 contenteditable="true">
TIRANGA
</h3>

<h4 contenteditable="true">
BUNTY LADY
</h4>

</div>

<div class="code">

<span>
ITEM CODE
</span>

<div
contenteditable="true"
class="codeBox">

BD-004

</div>

</div>

<div class="features">

<div class="feature">

<div class="icon">
↔
</div>

<div>

<b contenteditable="true">
5 Feet
</b>

<p contenteditable="true">
LONG
</p>

</div>

</div>

<div class="feature">

<div class="icon">
📦
</div>

<div>

<b contenteditable="true">
Pack of 5
</b>

<p contenteditable="true">
PACKING
</p>

</div>

</div>

<div class="feature">

<div class="icon">
★
</div>

<div>

<b contenteditable="true">
Premium Quality
</b>

<p contenteditable="true">
PREMIUM FINISH
</p>

</div>

</div>

<div class="feature">

<div class="icon">
🇮🇳
</div>

<div>

<b contenteditable="true">
Tricolor Decoration
</b>

<p contenteditable="true">
Perfect For All Occasions
</p>

</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right">

<img

id="productImage"

src="product.png"

alt="product">

<div class="zoomCircle">

<img

id="zoomImage"

src="product.png">

</div>

</div>
