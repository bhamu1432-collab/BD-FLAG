<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Catalogue Maker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="toolbar">

<button id="logoBtn">Logo</button>
<input type="file" id="logoInput" hidden accept="image/*">

<button id="productBtn">Product</button>
<input type="file" id="productInput" hidden accept="image/*">

<button id="downloadBtn">
Download A4
</button>

</div>


<div class="page" id="capture">

<img src="background.png" class="bg">


<header>

<div class="logo">

<img src="assets/logo.png" id="logoImage">

<div class="company">

<h1 contenteditable="true">
BHAGWAN
</h1>

<h2 contenteditable="true">
DECORATION
</h2>

</div>

</div>

</header>


<section class="main">


<div class="left">


<h3 contenteditable="true" class="gold">
TIRANGA
</h3>

<h4 contenteditable="true">
BUNTY LADY
</h4>


<div class="code">

<label>
ITEM CODE
</label>

<div contenteditable="true"
class="codeBox">

BD-004

</div>

</div>
<!-- FEATURES -->

<div class="features">

    <div class="feature">
        <div class="icon">📏</div>
        <div contenteditable="true" class="text">
            5 Feet Long
        </div>
    </div>

    <div class="feature">
        <div class="icon">📦</div>
        <div contenteditable="true" class="text">
            Pack of 5
        </div>
    </div>

    <div class="feature">
        <div class="icon">⭐</div>
        <div contenteditable="true" class="text">
            Premium Quality
        </div>
    </div>

    <div class="feature">
        <div class="icon">🇮🇳</div>
        <div contenteditable="true" class="text">
            Perfect Decoration
        </div>
    </div>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="right">

    <img src="assets/product.png"
         id="productImage">

</div>

</section>


<!-- BOTTOM -->

<footer>

<div class="bottomBox">

<div class="pack">

<div class="number"
contenteditable="true">

5

</div>

<div class="label"
contenteditable="true">

PC PACKET

</div>

</div>


<div class="pack">

<div class="number"
contenteditable="true">

50

</div>

<div class="label"
contenteditable="true">

PACKET CARTON

</div>

</div>

</div>


<div class="priceCircle">

<div
contenteditable="true"
class="priceTitle">

PRICE CATEGORY

</div>

<div
contenteditable="true"
class="priceValue">

A1

</div>

</div>

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
